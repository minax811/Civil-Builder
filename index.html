<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>— a tiny bridge-building physics game</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="topbar">
  <div class="pill" id="levelPill">Level 1</div>
  <div class="pill" id="budgetPill">$0 / $0</div>
  <div class="spacer"></div>
  <button class="ghost" id="undoBtn">↩ Undo</button>
  <button class="ghost" id="clearBtn">Clear</button>
  <button class="primary" id="testBtn">▶ Test drive</button>
</div>

<div id="stage">
  <div id="toolbar">
    <div class="tool active" data-tool="road"><img class="icon" src="road.png" alt="">ROAD<small id="roadCost"></small></div>
    <div class="tool" data-tool="steel"><img class="icon" src="strut.png" alt="">STRUT<small id="steelCost"></small></div>
    <div class="tool" data-tool="erase"><div class="swatch"></div>ERASE<small>click a beam</small></div>
  </div>
  <canvas id="cv"></canvas>
  <div id="hint">Drag between grid dots to build. <b>Road</b> is what the truck drives on — brace it with <b>struts</b>!</div>
</div>

<div id="overlay"><div id="card">
  <h2 id="cardTitle"></h2>
  <p id="cardText"></p>
  <div class="row" id="cardBtns"></div>
</div></div>
<script src="game.js"></script>
</body>
</html>
